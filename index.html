<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced RE Drill</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Styles (reduced) -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- Main UI -->
    <header class="navbar navbar-expand-lg bg-body-tertiary border-bottom px-3">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1 streak-board">
                Streak: <span id="streak-val" class="text-primary">0</span> 
                <small class="text-muted">(Best: <span id="best-streak-val">0</span>)</small> 
                <span class="mx-2">|</span> 
                Score: <span id="score-val" class="text-success">0/0</span>
            </span>
            <div class="d-flex gap-2">
                <button id="btn-toggle-view" class="btn btn-outline-warning">Converter</button>
                <button id="btn-toggle-theme" class="btn btn-outline-info">Toggle Theme</button>
                <button id="btn-review" class="btn btn-outline-secondary">Review Answers</button>
                <button id="btn-settings" class="btn btn-outline-primary">Settings</button>
            </div>
        </div>
    </header>

    <main class="container flex-grow-1 d-flex flex-column align-items-center justify-content-center py-5">
        
        <!-- Drill Card -->
        <div id="drill-card" class="card w-100 shadow-sm" style="max-width: 800px;">
            <div class="card-body p-4 p-md-5 text-center">
                <div id="question-text" class="question fs-4 mb-4">Initializing Core Systems...</div>
                
                <div id="input-container" class="input-container w-100 mx-auto" style="max-width: 550px; min-height: 120px;">
                    <!-- Dynamically populated via JS -->
                </div>

                <div id="feedback" class="feedback fw-bold fs-5 mt-4 mb-3" style="min-height: 30px;"></div>

                <div class="actions d-flex justify-content-center gap-3 mt-4">
                    <button id="btn-submit" class="btn btn-primary btn-lg" style="display:none;">Submit</button>
                    <button id="btn-skip" class="btn btn-warning btn-lg">Skip / Show Answer</button>
                    <button id="btn-next" class="btn btn-success btn-lg" style="display:none;">Next Question &rarr;</button>
                </div>
            </div>
        </div>

        <!-- Converter Card -->
        <div id="converter-card" class="card w-100 shadow-sm" style="max-width: 800px; display: none;">
            <div class="card-body p-4 p-md-5">
                <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                    <h3 class="card-title mb-0">Live Multi-Base Converter</h3>
                    <div>
                        <label class="form-label fw-bold me-2 mb-0">Architecture:</label>
                        <select id="conv-width" class="form-select w-auto d-inline-block">
                            <option value="8">8-bit</option>
                            <option value="16">16-bit</option>
                            <option value="32" selected>32-bit</option>
                            <option value="64">64-bit</option>
                        </select>
                    </div>
                </div>
                
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-primary">Hexadecimal (Base-16)</label>
                        <input type="text" id="conv-hex" class="form-control font-monospace" placeholder="e.g. 1A" autocomplete="off">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-success">Binary (Base-2)</label>
                        <input type="text" id="conv-bin" class="form-control font-monospace" placeholder="e.g. 0001 1010" autocomplete="off">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-warning">Octal (Base-8)</label>
                        <input type="text" id="conv-oct" class="form-control font-monospace" placeholder="e.g. 32" autocomplete="off">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-info">ASCII String</label>
                        <input type="text" id="conv-ascii" class="form-control font-monospace" placeholder="e.g. A" autocomplete="off">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-danger">Unsigned Decimal</label>
                        <input type="text" id="conv-udec" class="form-control font-monospace" placeholder="e.g. 26" autocomplete="off">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-danger">Signed Decimal (Two's Comp)</label>
                        <input type="text" id="conv-sdec" class="form-control font-monospace" placeholder="e.g. 26" autocomplete="off">
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Settings Modal -->
    <div class="modal fade" id="modal-settings" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">System Settings</h5>
                    <button type="button" class="btn-close" id="btn-cancel-settings-x" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Architecture (Bit-Width)</label>
                            <select id="set-width" class="form-select">
                                <option value="8">8-bit (Byte)</option>
                                <option value="16">16-bit (Word)</option>
                                <option value="32">32-bit (Dword)</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Input Method</label>
                            <select id="set-input" class="form-select">
                                <option value="random">Randomize Per Question</option>
                                <option value="mc">Always Multiple Choice</option>
                                <option value="text">Always Text Input</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Prefix Formatting</label>
                            <select id="set-prefix" class="form-select">
                                <option value="true">Require/Display '0x' & '0b'</option>
                                <option value="false">Exclude '0x' & '0b'</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Active Drill Mode</label>
                            <select id="set-mode" class="form-select">
                                <option value="1">Mode 1: Base & Encoding Conversions</option>
                                <option value="2">Mode 2: Signed vs. Unsigned</option>
                                <option value="3">Mode 3: Endianness Reversal</option>
                                <option value="4">Mode 4: Bitwise Operations</option>
                                <option value="5">Mode 5: CPU Flags (ALU)</option>
                            </select>
                        </div>
                    </div>

                    <div class="card mt-4 border-secondary shadow-sm" id="group-mode1-settings" style="display:none;">
                        <div class="card-header bg-secondary bg-opacity-10 fw-bold">
                            Mode 1: Base & Encoding Options
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-sm-6">
                                    <label class="form-label fw-bold small text-muted">From Base (Option 1)</label>
                                    <select id="set-source" class="form-select form-select-sm">
                                        <option value="random">Randomized (Default)</option>
                                        <option value="bin">Binary</option>
                                        <option value="hex">Hexadecimal</option>
                                        <option value="dec">Decimal</option>
                                        <option value="oct">Octal</option>
                                        <option value="ascii">ASCII</option>
                                    </select>
                                </div>
                                <div class="col-sm-6">
                                    <label class="form-label fw-bold small text-muted">To Base (Option 2)</label>
                                    <select id="set-target" class="form-select form-select-sm">
                                        <option value="random">Randomized (Default)</option>
                                        <option value="bin">Binary</option>
                                        <option value="hex">Hexadecimal</option>
                                        <option value="dec">Decimal</option>
                                        <option value="oct">Octal</option>
                                        <option value="ascii">ASCII</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <hr class="mt-4">
                    <div class="d-flex justify-content-between gap-2">
                        <button id="btn-reset-settings" class="btn btn-outline-danger btn-sm">Reset Settings</button>
                        <button id="btn-clear-progress" class="btn btn-outline-danger btn-sm">Clear Progress</button>
                    </div>

                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="btn-cancel-settings">Cancel</button>
                    <button type="button" class="btn btn-primary" id="btn-save-settings">Save Settings</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Review Modal -->
    <div class="modal fade" id="modal-review" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Session History</h5>
                    <button type="button" class="btn-close" id="btn-close-review-x" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="review-log" class="review-log d-flex flex-column gap-3">
                        <!-- Dynamically populated via JS -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="btn-close-review">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirm Reset Settings Modal -->
    <div class="modal fade" id="modal-confirm-reset" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h6 class="modal-title">Confirm Reset</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Reset all settings to default?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger btn-sm" id="btn-confirm-reset">Reset</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirm Clear Progress Modal -->
    <div class="modal fade" id="modal-confirm-clear" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h6 class="modal-title">Confirm Clear</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Clear all game progress, score, and streaks?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger btn-sm" id="btn-confirm-clear">Clear</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
