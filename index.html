<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced RE Drill</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark">
    <!-- Main UI -->
    <header>
        <div class="streak-board">Streak: <span id="streak-val">0</span> | Score: <span id="score-val">0/0</span></div>
        <div class="header-btns">
            <button id="btn-review">Review Answers</button>
            <button id="btn-settings">Settings</button>
        </div>
    </header>

    <main class="quiz-container">
        <div id="question-text" class="question">Initializing Core Systems...</div>
        
        <div id="input-container" class="input-container">
            <!-- Dynamically populated via JS -->
        </div>

        <div id="feedback" class="feedback"></div>

        <div class="actions">
            <button id="btn-submit" style="display:none;">Submit</button>
            <button id="btn-skip">Skip / Show Answer</button>
            <button id="btn-next" style="display:none;">Next Question -></button>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="modal-settings" class="modal hidden">
        <div class="modal-content">
            <h2>System Settings</h2>
            
            <div class="form-group">
                <label>Theme</label>
                <select id="set-theme">
                    <option value="dark">Dark (Terminal)</option>
                    <option value="light">Light (High Contrast)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Architecture (Bit-Width)</label>
                <select id="set-width">
                    <option value="8">8-bit (Byte)</option>
                    <option value="16">16-bit (Word)</option>
                    <option value="32">32-bit (Dword)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Input Method</label>
                <select id="set-input">
                    <option value="random">Randomize Per Question</option>
                    <option value="mc">Always Multiple Choice</option>
                    <option value="text">Always Text Input</option>
                </select>
            </div>

            <div class="form-group">
                <label>Prefix Formatting</label>
                <select id="set-prefix">
                    <option value="true">Require/Display '0x' & '0b'</option>
                    <option value="false">Exclude '0x' & '0b'</option>
                </select>
            </div>

            <div class="form-group">
                <label>Active Drill Mode</label>
                <select id="set-mode">
                    <option value="1">Mode 1: Base & Encoding Conversions</option>
                    <option value="2">Mode 2: Signed vs. Unsigned</option>
                    <option value="3">Mode 3: Endianness Reversal</option>
                    <option value="4">Mode 4: Bitwise Operations</option>
                    <option value="5">Mode 5: CPU Flags (ALU)</option>
                </select>
            </div>

            <div class="form-group sub-setting" id="group-source-base" style="display:none;">
                <label>Mode 1: Base Option 1</label>
                <select id="set-source">
                    <option value="random">Randomized (Default)</option>
                    <option value="bin">Binary</option>
                    <option value="hex">Hexadecimal</option>
                    <option value="dec">Decimal</option>
                    <option value="oct">Octal</option>
                    <option value="ascii">ASCII</option>
                </select>
            </div>

            <div class="form-group sub-setting" id="group-target-base" style="display:none;">
                <label>Mode 1: Base Option 2</label>
                <select id="set-target">
                    <option value="random">Randomized (Default)</option>
                    <option value="bin">Binary</option>
                    <option value="hex">Hexadecimal</option>
                    <option value="dec">Decimal</option>
                    <option value="oct">Octal</option>
                    <option value="ascii">ASCII</option>
                </select>
            </div>

            <div class="modal-actions">
                <button id="btn-save-settings">Save & Restart Drill</button>
                <button id="btn-cancel-settings">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Review Modal -->
    <div id="modal-review" class="modal hidden">
        <div class="modal-content review-content">
            <h2>Session History</h2>
            <div id="review-log" class="review-log">
                <!-- Dynamically populated via JS -->
            </div>
            <div class="modal-actions">
                <button id="btn-close-review">Close</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
